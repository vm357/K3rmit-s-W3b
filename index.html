<body>
<div id="app"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="_ds/nvidia-design-system-73d77d69-f22c-44f4-a150-09f3b4f8ac8a/_ds_bundle.js"></script>
<script type="text/babel" src="lib/tweaks-panel.jsx"></script>
<script type="text/babel" src="lib/chrome.jsx"></script>
<script type="text/babel" src="lib/site-mock.jsx"></script>
<script type="text/babel" src="lib/visuals.jsx"></script>
<script type="text/babel" src="landing.jsx"></script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": ["#76b900", "#5a8d00"],
  "heroDark": true,
  "heroLayout": "split"
}/*EDITMODE-END*/;

const ACCENTS = [
  ["#76b900", "#5a8d00"], // Kermit green
  ["#00a3e0", "#0079a8"], // cyan
  ["#df6500", "#a84c00"], // amber
  ["#952fc6", "#6e1f93"], // purple
];

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  return (
    <div style={{ "--color-primary": t.accent[0], "--color-primary-dark": t.accent[1] }}>
      <Nav current="home" />
      <main>
        <Hero dark={t.heroDark} layout={t.heroLayout} />
        <Services />
        <Process />
        <Stats />
        <WorkPreview />
        <CtaBridge />
      </main>
      <Footer />
      <TweaksPanel>
        <TweakSection label="Hero" />
        <TweakRadio label="Layout" value={t.heroLayout}
          options={["split", "centered", "editorial"]}
          onChange={(v) => setTweak("heroLayout", v)} />
        <TweakToggle label="Dark hero" value={t.heroDark}
          onChange={(v) => setTweak("heroDark", v)} />
        <TweakSection label="Brand" />
        <TweakColor label="Accent" value={t.accent} options={ACCENTS}
          onChange={(v) => setTweak("accent", v)} />
      </TweaksPanel>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
